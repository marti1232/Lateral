<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lateral Klingele</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            /* MANTENIM EL FONS GRIS GENERAL */
            background-color: #c1f5d4;
            margin: 0;
            padding: 60px 20px; 
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            align-items: center; /* Tot el contingut centrat */
            
            /* AMPLADA DE LA BARRA LATERAL */
            width: 290px; 

            /* RECUPEREM LA LÍNIAA NEGRA VERTICAL A LA DRETA */
            border-right: 15px solid #000000; 
        }

        .logo-contenidor {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-contenidor img {
            max-width: 100%; 
            height: auto;
            display: block;
        }

        /* BLOC CENTRAL PER A L'HORA */
        .hora-contenidor {
            text-align: center;
            color: #000000;
            width: 100%;
        }

        #hora {
            font-size: 58px; 
            font-weight: bold;
            line-height: 1;
            letter-spacing: -1.5px;
        }

        /* BLOC INFERIOR PER A LA DATA DESGLOSSADA, GRAN I CENTRADA */
        .data-contenidor {
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px; /* Espaiat entre dia, mes i any */
        }

        .data-linia {
            font-weight: 600;
            color: #000000;
            text-transform: capitalize;
            width: 100%;
            text-align: center;
        }

        /* MIDES GRANS DE LA DATA */
        #data-dia {
            font-size: 32px;
            color: #000000;
            font-weight: 700;
        }
        
        #data-mes {
            font-size: 26px;
        }

        #data-any {
            font-size: 26px;
            color: #000000;
        }
    </style>
</head>

        <div id="data-dia" class="data-linia">Carregant dia...</div>

    <script>
    function actualitzarRellotge() {
        const ara = new Date();
        
        // Actualitza l'Hora
        const opcionsHora = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: 'Europe/Madrid' };
        document.getElementById('hora').innerText = ara.toLocaleTimeString('ca-ES', opcionsHora);
        
        // Extraiem les línies de la data per separat
        const opcioDiaSetmana = { weekday: 'long', timeZone: 'Europe/Madrid' };
        const opcioDiaMes = { day: 'numeric', month: 'long', timeZone: 'Europe/Madrid' };
        
        let diaSetmana = ara.toLocaleDateString('ca-ES', opcioDiaSetmana);
        let diaMes = ara.toLocaleDateString('ca-ES', opcioDiaMes);
        let any = ara.getFullYear();
        
        // Netegem i formategem els textos en català
        diaSetmana = diaSetmana.charAt(0).toUpperCase() + diaSetmana.slice(1);
        
        diaMes = diaMes.replace('de 20', '').replace('del 20', '').trim();
        diaMes = diaMes.charAt(0).toUpperCase() + diaMes.slice(1);

        // Injectem cada valor a la seva línia corresponent
        document.getElementById('data-dia').innerText = diaSetmana;
        document.getElementById('data-mes').innerText = diaMes;
        document.getElementById('data-any').innerText = any;
    }

    setInterval(actualitzarRellotge, 1000);
    actualitzarRellotge();
    </script>
